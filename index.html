};
firebase.initializeApp(firebaseConfig);
var _db = firebase.database();
var _dbRef = _db.ref('tawzea/data');
window._fbReady = true;
window._fbSet = function(data){ _dbRef.set(data); };
var _ordersRef = firebase.database().ref('tawzea/orders');
var _orders = [];
_ordersRef.on('value', function(snap){
  try{
    var val = snap.val();
    _orders = val ? Object.entries(val).map(function(e){var o=e[1];o._key=e[0];return o;}).sort(function(a,b){return b.id-a.id;}) : [];
  }catch(e){_orders=[];}
  if(window._appRender||typeof render==='function') try{renderOrders();}catch(e){}
});

// استدعاء مباشر بدل الحدث
_dbRef.on('value', function(snap){
  window._fbLoaded = true;
  var val = snap.val();
  var S = window._appS;
  if(!S) return;
  S.products = (val && val.products)||[];
  S.ws       = (val && val.ws)||[];
  S.bundles  = (val && val.bundles)||[];
  S.sales    = (val && val.sales)||[];
  S.debts    = (val && val.debts)||[];
  var ld = document.getElementById('loading-screen');
  if(ld) ld.style.display='none';
  var app = document.getElementById('main-content');

  if(window._appRender) window._appRender();
  var el = document.getElementById('sync-status');

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0d1117;color:#e6edf3;font-family:'Segoe UI',Tahoma,sans-serif;direction:rtl;min-height:100vh}
.app{max-width:980px;margin:0 auto;padding:1rem}
.hdr{display:flex;align-items:center;gap:12px;margin-bottom:1.5rem;padding-bottom:1rem;border-bottom:1px solid rgba(255,255,255,.08);min-height:70px}
.hdr-logo{width:46px;height:46px;background:#c0392b;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0}

.tab.active{background:#c0392b;color:#fff;font-weight:600}
.sec{display:none}.sec.active{display:block}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:8px;margin-bottom:1.25rem}
.stat{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.07);border-radius:10px;padding:.85rem;text-align:center}
.stat .sv{font-size:20px;font-weight:700;margin-bottom:3px}
.stat .sl{color:#8b949e;font-size:11px}
.cg{color:#27ae60}.cr{color:#c0392b}.cb{color:#2980b9}.co{color:#e67e22}
.pgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(195px,1fr));gap:12px}
.pc{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);border-radius:12px;overflow:hidden;transition:.2s}
.pc:hover{border-color:#c0392b;transform:translateY(-1px)}
.pi{width:100%;height:130px;background:#1c2128;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
.pi img{width:100%;height:100%;object-fit:cover}
.pi .cam-ov{position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,.6);text-align:center;font-size:11px;padding:4px;color:#ccc;cursor:pointer}
.pinfo{padding:10px}
.pn{font-weight:600;font-size:13px;margin-bottom:3px}
.pp{color:#e67e22;font-size:12px;margin-bottom:2px}
.pqr{display:flex;gap:5px;align-items:center;margin-top:6px}
.qi{flex:1;padding:5px 8px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:6px;color:#fff;font-size:12px;text-align:center;direction:ltr}
.qi:focus{outline:none;border-color:#c0392b}

.bn:hover{opacity:.88}.bn:active{transform:scale(.97)}
.br{background:#c0392b;color:#fff}
.bg2{background:#27ae60;color:#fff}
.bo{background:#e67e22;color:#1a1a1a}
.bb{background:#2980b9;color:#fff}
.bpur{background:#8e44ad;color:#fff}
.bn-sm{padding:4px 9px;font-size:11px}
.bn-lg{padding:11px 18px;font-size:13px;border-radius:9px;width:100%;margin-top:7px}
.fg{display:flex;flex-direction:column;gap:5px;margin-bottom:10px}
.fg label{font-size:12px;color:#8b949e}

.fg select option{background:#1c2128;color:#eee}

.iup-box:hover{border-color:#c0392b}

.iup-box input[type=file]{position:absolute;opacity:0;inset:0;cursor:pointer}
.badge{display:inline-block;padding:2px 7px;border-radius:20px;font-size:10px;font-weight:600}
.bg-r{background:rgba(192,57,43,.2);color:#e74c3c}
.bg-g{background:rgba(39,174,96,.2);color:#27ae60}
.bg-o{background:rgba(230,126,34,.2);color:#e67e22}

.bg-pur{background:rgba(142,68,173,.2);color:#9b59b6}

.tier-box.sel{border-color:#e67e22;background:rgba(230,126,34,.15)}

.tier-box .tu{font-size:10px;color:#8b949e;margin-bottom:4px}
.tier-box .tp{font-size:13px;font-weight:600;color:#fff}

.bi-qty{font-size:13px;color:#e67e22;font-weight:700}

.debt-meta{font-size:11px;color:#8b949e;margin-top:2px}

.debt-actions{display:flex;gap:5px;flex-shrink:0}

.cart-item-row:last-child{border-bottom:none}
.confirm-paid-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:300;align-items:center;justify-content:center;padding:1rem}
.confirm-paid-overlay.open{display:flex}
.confirm-paid-box{background:#161b22;border:1px solid rgba(255,255,255,.12);border-radius:16px;padding:1.75rem;width:100%;max-width:320px;text-align:center}

<script>
var S = {
  products: [],
  ws:       [],
  bundles:  [],
  sales:    [],
  debts:    []
};
window._appS = S;
var tempImg=null, confirmCb=null, debtFilter='all';
var cart={};
var _saveTimer=null;
var _fbLoaded=false;

function showSyncStatus(msg,color){
  var el=document.getElementById('sync-status');
  if(el){el.textContent=msg;el.style.color=color||'#8b949e';}
}

// ---- حفظ على Firebase فقط ----
function save(){
  if(window._fbSet){
    clearTimeout(_saveTimer);
    _saveTimer=setTimeout(function(){
      window._fbSet({
        products: S.products,
        ws: S.ws,
        bundles: S.bundles,
        sales: S.sales,
        debts: S.debts,
        _ts: Date.now()
      });
    },600);
  }
}

// ---- Firebase هو المصدر الوحيد ----
function initFirebase(){
  showSyncStatus('جاري الاتصال...','#e67e22');
  if(window._fbOnValue){
    window._fbOnValue(function(val){
      _fbLoaded=true;
      S.products = (val && val.products)||[];
      S.ws       = (val && val.ws)||[];
      S.bundles  = (val && val.bundles)||[];
      S.sales    = (val && val.sales)||[];
      S.debts    = (val && val.debts)||[];
      // أخفِ شاشة التحميل
      var ld=document.getElementById('loading-screen');
      if(ld)ld.style.display='none';
      var app=document.getElementById('main-app');
      if(app)app.style.display='block';
      render();
      showSyncStatus('✅ متصل','#27ae60');
    });
  }
}

// ربط S و render مع Firebase
// _appS already set above
window._appRender = function(){ if(typeof render==='function') render(); };

// إذا ما اتحمّل Firebase بعد 8 ثوانٍ
setTimeout(function(){
  if(!_fbLoaded){
    var ld=document.getElementById('loading-screen');
    if(ld)ld.innerHTML='<div style="text-align:center;padding:2rem"><div style="font-size:48px;margin-bottom:1rem">⚠️</div><div style="font-size:16px;color:#c0392b;font-weight:600">تعذّر الاتصال</div><div style="font-size:13px;color:#8b949e;margin-top:8px">تأكد من الإنترنت وأعد المحاولة</div><button onclick="location.reload()" style="margin-top:16px;padding:10px 24px;background:#c0392b;color:#fff;border:none;border-radius:8px;font-size:14px;cursor:pointer">إعادة المحاولة</button></div>';
  }
},8000);

function sw(t){
  var tabs=['inv','ws','bun','orders','debt','prof'];
  document.querySelectorAll('.tab').forEach(function(el,i){el.classList.toggle('active',tabs[i]===t);});
  document.querySelectorAll('.sec').forEach(function(el){el.classList.remove('active');});
  document.getElementById('sec-'+t).classList.add('active');
  render();
}

function openModal(html){
  document.getElementById('mc').innerHTML=html;
  document.getElementById('modal').classList.add('open');
}
function closeModal(){
  document.getElementById('modal').classList.remove('open');
  tempImg=null;
}
document.getElementById('modal').addEventListener('click',function(e){if(e.target===this)closeModal();});

function showConfirm(data,cb){
  confirmCb=cb;
  var rows=data.items.map(function(i){return '<div class="confirm-detail-row"><span style="color:#8b949e">'+i.label+'</span><span>'+i.val+'</span></div>';}).join('');
  var pc=data.profit>=0?'#27ae60':'#c0392b', pb=data.profit>=0?'rgba(39,174,96,.1)':'rgba(192,57,43,.1)';
  document.getElementById('confirm-box').innerHTML=
    '<h4>'+data.title+'</h4>'+
    '<div class="confirm-amount">'+data.total.toFixed(3)+' ر.ع</div>'+
    '<div class="confirm-detail">'+rows+'</div>'+
    '<div class="confirm-profit" style="color:'+pc+';background:'+pb+'">'+(data.profit>=0?'الربح المتوقع':'الخسارة')+': '+Math.abs(data.profit).toFixed(3)+' ر.ع</div>'+
    '<div class="fg" style="margin-bottom:10px">'+
      '<label style="font-size:12px;color:#8b949e">اسم الزبون (اختياري)</label>'+

    '</div>';
  document.getElementById('confirm-ov').classList.add('open');

}
function setPayStatus(val){
  window._payNow=val;
  document.getElementById('pay-yes').style.opacity=val?'1':'.4';
  document.getElementById('pay-no').style.opacity=val?'.4':'1';
}
function doConfirm(){
  document.getElementById('confirm-ov').classList.remove('open');
  if(confirmCb){confirmCb(window._payNow);confirmCb=null;}
}
function cancelConfirm(){
  document.getElementById('confirm-ov').classList.remove('open');
  confirmCb=null;
}

function toast(msg,ok){
  var d=document.createElement('div');
  d.className='toast';
  d.style.background=ok!==false?'rgba(39,174,96,.9)':'rgba(192,57,43,.9)';
  d.textContent=msg;
  document.body.appendChild(d);
  setTimeout(function(){d.style.opacity='0';setTimeout(function(){d.remove();},300);},3000);
}

function recordSaleAndDebt(sale,payNow){
  var customerName=(document.getElementById('conf-customer')||{}).value||'';
  sale.customer=customerName.trim();
  sale.paid=payNow;
  sale.paidDate=payNow?new Date().toLocaleString('ar-SA'):'';
  sale.saleId=sale.time; // مفتاح مطابقة فريد
  S.sales.unshift(sale);
  if(!payNow){
    S.debts.unshift({
      id:Date.now(),
      saleId:sale.saleId, // ربط الدين بالبيع مباشرة
      customer:customerName||'زبون غير معروف',
      amount:sale.revenue,
      desc:sale.name,
      time:sale.time,
      paid:false,
      paidDate:''
    });
  }
}

function triggerImg(i){document.getElementById('img-inp-'+i).click();}
function uploadImg(i,input){
  var file=input.files[0];if(!file)return;
  var r=new FileReader();
  r.onload=function(e){S.products[i].img=e.target.result;save();render();};
  r.readAsDataURL(file);
}

function sellOne(idx){
  var qty=parseInt(document.getElementById('si-'+idx).value)||1;
  var p=S.products[idx];
  if(qty>p.qty){toast('الكمية أكبر من المخزون!',false);return;}
  var uc=p.costTotal/p.totalUnits;
  var revenue=qty*p.sellPrice, cost=qty*uc, profit=revenue-cost;
  showConfirm({
    title:'بيع: '+p.name,
    items:[{label:'الكمية',val:qty+' '+p.unit},{label:'سعر الحبة',val:p.sellPrice.toFixed(3)+' ر.ع'},{label:'الإيراد',val:revenue.toFixed(3)+' ر.ع'},{label:'التكلفة',val:cost.toFixed(3)+' ر.ع'}],
    total:revenue,profit:profit
  },function(payNow){
    p.qty-=qty;
    recordSaleAndDebt({type:'مفرد',name:p.name,qty:qty,price:p.sellPrice,cost:uc,revenue:revenue,profit:profit,time:new Date().toLocaleString('ar-SA')},payNow);
    save();render();toast('✅ تم البيع — ربح: '+profit.toFixed(3)+' ر.ع');
  });
}

function calcPrev(){
  var c=parseFloat(document.getElementById('pcost').value)||0;

  var ph=document.getElementById('profit-hint');
  if(ph&&p>0&&uc>0){ph.textContent='ربح/حبة: '+(p-uc).toFixed(3)+' ر.ع';ph.style.color=p-uc>=0?'#27ae60':'#c0392b';}
}

function renderWS(){
  var list=document.getElementById('ws-list');
  if(!S.ws.length){list.innerHTML='<div style="color:#8b949e;text-align:center;padding:2.5rem">لا يوجد — اضغط "+ جملة جديد"</div>';return;}

    var tiersHtml=w.tiers.map(function(t,ti){
      var up=t.totalPrice/t.qty;

      return '<div class="tier-box" id="tb-'+wi+'-'+ti+'" onclick="selectTier('+wi+','+ti+')">'+

        '<div class="tu">'+(p?p.unit:'حبة')+'</div>'+
        '<div class="tp">'+t.totalPrice.toFixed(3)+' ر.ع</div>'+
        '<div style="font-size:10px;color:#8b949e;margin-top:2px">'+up.toFixed(3)+' ر.ع/'+(p?p.unit:'حبة')+'</div>'+
        '<div class="tpr" style="color:'+(prf>=0?'#27ae60':'#c0392b')+'">'+(prf>=0?'↑':'↓')+Math.abs(prf).toFixed(3)+'</div>'+

    return '<div class="ws-card">'+
      '<div class="ws-hdr">'+
        '<div style="display:flex;align-items:center;gap:10px">'+
          prodImg+
          '<div><div class="ws-name">'+w.name+'</div><div style="font-size:12px;color:#8b949e">'+(p?p.name:'منتج محذوف')+' | المخزون: <strong style="color:#27ae60">'+(p?p.qty:0)+'</strong> '+(p?p.unit:'')+'</div></div>'+
        '</div>'+
        '<div style="display:flex;gap:6px">'+
          '<button class="bn bn-sm" style="background:rgba(255,255,255,.07);color:#ccc" onclick="editWS('+wi+')">✏️</button>'+
          '<button class="bn br bn-sm" onclick="delWS('+wi+')">🗑️</button>'+
        '</div>'+
      '</div>'+
      '<div class="tiers-grid" id="tg-'+wi+'">'+tiersHtml+'</div>'+
      '<div class="ws-sell-bar">'+
        '<div><div style="font-size:11px;color:#8b949e;margin-bottom:4px">الكمية</div>'+
        '<input class="ws-qty" type="number" id="wq-'+wi+'" value="'+(w.tiers[0]?w.tiers[0].qty:1)+'" min="1" oninput="calcWS('+wi+')" onchange="calcWS('+wi+')"></div>'+
        '<div class="ws-info"><div style="font-size:11px;color:#8b949e">الإجمالي</div><div class="ws-total" id="wt-'+wi+'">—</div><div class="ws-profit-line" id="wp-'+wi+'"></div></div>'+
        '<button class="bn bb" onclick="sellWS('+wi+')" style="padding:11px 18px;font-size:13px">💰 بيع</button>'+
      '</div>'+
    '</div>';
  }).join('');
  S.ws.forEach(function(w,wi){calcWS(wi);});
}

function selectTier(wi,ti){
  var w=S.ws[wi];
  document.querySelectorAll('[id^="tb-'+wi+'-"]').forEach(function(el){el.classList.remove('sel');});
  var el=document.getElementById('tb-'+wi+'-'+ti);if(el)el.classList.add('sel');
  var inp=document.getElementById('wq-'+wi);
  if(inp){inp.value=w.tiers[ti].qty;calcWS(wi);}
}
function calcWS(wi){
  var w=S.ws[wi];
  var p=S.products.find(function(x){return x.id===w.productId;});
  var inp=document.getElementById('wq-'+wi);
  if(!inp||!p)return;
  var qty=parseInt(inp.value)||0;
  var uc=p.costTotal/p.totalUnits;
  var sorted=w.tiers.slice().sort(function(a,b){return b.qty-a.qty;});
  var tier=sorted.find(function(t){return qty>=t.qty;});
  var up=tier?tier.totalPrice/tier.qty:p.sellPrice;
  var total=qty*up, profit=total-qty*uc;
  var wt=document.getElementById('wt-'+wi), wp=document.getElementById('wp-'+wi);
  if(wt)wt.textContent=total.toFixed(3)+' ر.ع';
  if(wp){wp.textContent=(profit>=0?'ربح':'خسارة')+': '+Math.abs(profit).toFixed(3)+' ر.ع | '+up.toFixed(3)+' ر.ع/'+p.unit;wp.style.color=profit>=0?'#27ae60':'#c0392b';}
  if(tier){document.querySelectorAll('[id^="tb-'+wi+'-"]').forEach(function(el,i){el.classList.toggle('sel',w.tiers[i]&&w.tiers[i].qty===tier.qty);});}
}
function sellWS(wi){
  var w=S.ws[wi];
  var p=S.products.find(function(x){return x.id===w.productId;});
  if(!p){toast('المنتج غير موجود',false);return;}
  var qty=parseInt(document.getElementById('wq-'+wi).value)||0;
  if(qty<1){toast('أدخل كمية صحيحة',false);return;}
  if(qty>p.qty){toast('المخزون غير كافٍ! المتاح: '+p.qty,false);return;}
  var uc=p.costTotal/p.totalUnits;
  var sorted=w.tiers.slice().sort(function(a,b){return b.qty-a.qty;});
  var tier=sorted.find(function(t){return qty>=t.qty;});
  if(!tier){toast('الكمية أقل من أدنى شريحة ('+w.tiers[0].qty+')',false);return;}
  var up=tier.totalPrice/tier.qty;
  var revenue=qty*up, cost=qty*uc, profit=revenue-cost;
  showConfirm({
    title:'جملة: '+w.name,
    items:[{label:'المنتج',val:p.name},{label:'الكمية',val:qty+' '+p.unit},{label:'شريحة',val:tier.qty+' بـ '+tier.totalPrice.toFixed(3)+' ر.ع'},{label:'سعر الحبة',val:up.toFixed(3)+' ر.ع'},{label:'الإيراد',val:revenue.toFixed(3)+' ر.ع'}],
    total:revenue,profit:profit
  },function(payNow){
    p.qty-=qty;
    recordSaleAndDebt({type:'جملة',name:w.name+'('+p.name+')',qty:qty,price:up,cost:uc,revenue:revenue,profit:profit,time:new Date().toLocaleString('ar-SA')},payNow);
    save();render();toast('✅ بيع جملة '+qty+' '+p.unit,profit>=0);
  });
}

    '<button class="bn bn-lg" style="background:rgba(255,255,255,.06);color:#ccc;border:1px solid rgba(255,255,255,.08)" onclick="addTR()">+ إضافة شريحة</button>'+

function makeTR(){return '<div class="tier-input-row"><input class="tier-inp" type="number" placeholder="الكمية (مثال: 20)"><input class="tier-inp" type="number" step="0.001" placeholder="السعر الإجمالي (مثال: 2.000)"><span></span></div>';}

function renderBundles(){
  var list=document.getElementById('bun-list');
  if(!S.bundles.length){list.innerHTML='<div style="color:#8b949e;text-align:center;padding:2.5rem">لا يوجد عروض — اضغط "+ عرض جديد"</div>';return;}
  list.innerHTML=S.bundles.map(function(b,bi){
    var tc=b.items.reduce(function(s,it){var p=S.products.find(function(x){return x.id===it.productId;});return s+(p?it.qty*(p.costTotal/p.totalUnits):0);},0);
    var profit=b.price-tc;
    var canSell=b.items.every(function(it){var p=S.products.find(function(x){return x.id===it.productId;});return p&&p.qty>=it.qty;});
    var itemsHtml=b.items.map(function(it){
      var p=S.products.find(function(x){return x.id===it.productId;});
      return '<div class="bi-card">'+
        '<div class="bi-thumb">'+(p&&p.img?'<img src="'+p.img+'" alt="'+(p.name)+'">':(p?'📦':'❓'))+'</div>'+
        '<div class="bi-name">'+(p?p.name:'محذوف')+'</div>'+
        '<div class="bi-qty">'+it.qty+' '+(p?p.unit:'')+'</div>'+
      '</div>';
    }).join('');
    return '<div class="bun-card">'+
      '<div class="bun-hdr">'+
        '<span style="font-weight:600;font-size:15px">'+b.name+'</span>'+
        '<div style="display:flex;gap:6px">'+
          '<button class="bn bn-sm" style="background:rgba(255,255,255,.07);color:#ccc" onclick="editBundle('+bi+')">✏️</button>'+
          '<button class="bn br bn-sm" onclick="delBundle('+bi+')">🗑️</button>'+
        '</div>'+
      '</div>'+
      '<div class="bun-items-grid">'+itemsHtml+'</div>'+
      '<div class="bun-footer">'+
        '<div><div class="bun-price">'+b.price.toFixed(3)+' ر.ع</div><div class="bun-profit-lbl">'+(profit>=0?'ربح':'خسارة')+': <span style="color:'+(profit>=0?'#27ae60':'#c0392b')+'">'+Math.abs(profit).toFixed(3)+' ر.ع</span></div></div>'+
        '<button class="bn '+(canSell?'bb':'')+'" style="'+(canSell?'':'background:rgba(255,255,255,.05);color:#555;cursor:not-allowed')+';padding:10px 20px;font-size:13px" onclick="'+(canSell?'sellBundle('+bi+')':'toast(\'المخزون غير كافٍ\',false)')+'">'+(canSell?'🛒 بيع العرض':'⚠️ مخزون ناقص')+'</button>'+
      '</div>'+
    '</div>';
  }).join('');
}
function sellBundle(bi){
  var b=S.bundles[bi];
  var tc=b.items.reduce(function(s,it){var p=S.products.find(function(x){return x.id===it.productId;});return s+(p?it.qty*(p.costTotal/p.totalUnits):0);},0);
  var profit=b.price-tc;
  var items=b.items.map(function(it){var p=S.products.find(function(x){return x.id===it.productId;});return{label:p?p.name:'منتج',val:it.qty+' '+(p?p.unit:'حبة')};});
  showConfirm({title:'عرض: '+b.name,items:items,total:b.price,profit:profit},function(payNow){
    b.items.forEach(function(it){var p=S.products.find(function(x){return x.id===it.productId;});if(p)p.qty-=it.qty;});
    recordSaleAndDebt({type:'عرض',name:b.name,qty:1,price:b.price,cost:tc,revenue:b.price,profit:profit,time:new Date().toLocaleString('ar-SA')},payNow);
    save();render();toast('✅ تم بيع العرض',profit>=0);
  });
}

/* ===== DEBTS ===== */
function filterDebt(f){
  debtFilter=f;
  ['all','unpaid','paid'].forEach(function(k){
    var el=document.getElementById('df-'+k);
    if(el)el.style.fontWeight=k===f?'700':'400';
  });
  renderDebts();
}
function renderDebts(){
  var unpaidTotal=S.debts.filter(function(d){return !d.paid;}).reduce(function(s,d){return s+d.amount;},0);
  var paidTotal=S.debts.filter(function(d){return d.paid;}).reduce(function(s,d){return s+d.amount;},0);
  document.getElementById('debt-stats').innerHTML=
    '<div class="stat cr"><div class="sv">'+S.debts.filter(function(d){return !d.paid;}).length+'</div><div class="sl">لم يدفع</div></div>'+
    '<div class="stat cr"><div class="sv">'+unpaidTotal.toFixed(3)+'</div><div class="sl">إجمالي الديون (ر.ع)</div></div>'+
    '<div class="stat cg"><div class="sv">'+S.debts.filter(function(d){return d.paid;}).length+'</div><div class="sl">تم الدفع</div></div>'+
    '<div class="stat cg"><div class="sv">'+paidTotal.toFixed(3)+'</div><div class="sl">إجمالي المُحصَّل (ر.ع)</div></div>';
  var filtered=S.debts.filter(function(d){
    if(debtFilter==='paid')return d.paid;
    if(debtFilter==='unpaid')return !d.paid;
    return true;
  });
  var list=document.getElementById('debt-list');
  if(!filtered.length){list.innerHTML='<div style="color:#8b949e;text-align:center;padding:2rem;font-size:13px">لا يوجد سجلات</div>';return;}
  list.innerHTML=filtered.map(function(d,i){
    var realIdx=S.debts.indexOf(d);
    return '<div class="debt-row '+(d.paid?'debt-paid':'')+'">'+
      '<div style="flex:1">'+
        '<div class="debt-name">'+d.customer+(d.paid?' <span class="badge bg-g">تم الدفع ✓</span>':' <span class="badge bg-r">لم يدفع</span>')+'</div>'+
        '<div class="debt-meta">'+d.desc+' | '+d.time+(d.paid&&d.paidDate?' | دفع: '+d.paidDate:'')+'</div>'+
      '</div>'+
      '<div class="debt-amount">'+d.amount.toFixed(3)+' ر.ع</div>'+
      '<div class="debt-actions">'+
        (!d.paid?'<button class="bn bg2 bn-sm" onclick="markPaid('+realIdx+')">تم الدفع ✓</button>':'')+
        '<button class="bn bn-sm" style="background:rgba(255,255,255,.07);color:#ccc" onclick="editDebt('+realIdx+')">✏️</button>'+
        '<button class="bn br bn-sm" onclick="delDebt('+realIdx+')">🗑️</button>'+
      '</div>'+
    '</div>';
  }).join('');
}
var _adminPayIdx = null;
function markPaid(i){
  var d=S.debts[i];
  _adminPayIdx = i;
  document.getElementById('admin-pay-msg').textContent =
    'الزبون: ' + d.customer + ' | المبلغ: ' + d.amount.toFixed(3) + ' ر.ع';
  document.getElementById('admin-pay-ov').classList.add('open');
}
function adminPayYes(){
  document.getElementById('admin-pay-ov').classList.remove('open');
  if(_adminPayIdx===null) return;
  var i=_adminPayIdx; _adminPayIdx=null;
  var d=S.debts[i];
  d.paid=true;
  d.paidDate=new Date().toLocaleString('ar-SA');
  S.sales.forEach(function(s){
    var match = (d.saleId && s.saleId && d.saleId===s.saleId) ||
                (d.time && s.time && d.time===s.time);
    if(match && !s.paid){ s.paid=true; s.paidDate=d.paidDate; }
  });
  save();render();toast('✅ تم الدفع بنجاح');
}
function adminPayNo(){
  document.getElementById('admin-pay-ov').classList.remove('open');
  _adminPayIdx=null;
}

function saveDebtEdit(i){
  var d=S.debts[i];
  var oldCustomer=d.customer;
  d.customer=document.getElementById('ed-name').value||d.customer;
  d.amount=parseFloat(document.getElementById('ed-amount').value)||d.amount;
  d.desc=document.getElementById('ed-desc').value||d.desc;
  var paidVal=document.getElementById('ed-paid').value==='yes';
  var wasUnpaid=!d.paid;
  d.paid=paidVal;
  d.paidDate=paidVal?(document.getElementById('ed-pdate').value||new Date().toLocaleString('ar-SA')):'';
  // sync matching sale
  if(paidVal && wasUnpaid){
    S.sales.forEach(function(s){
      var match = (d.saleId && s.saleId && d.saleId===s.saleId) ||
                  (d.time && s.time && d.time===s.time);
      if(match && !s.paid){s.paid=true;s.paidDate=d.paidDate;}
    });
  }
  save();closeModal();render();toast('✅ تم التعديل');
}
function delDebt(i){if(!confirm('حذف هذا السجل؟'))return;S.debts.splice(i,1);save();render();}

/* ===== سلة الإدارة ===== */
function chgACart(key,idx,type,delta){
  var maxQty=9999;
  if(type==='p')maxQty=S.products[idx].qty;
  var cur=cart[key]||0;
  var nq=Math.max(0,Math.min(cur+delta,maxQty));
  if(nq===0)delete cart[key]; else cart[key]=nq;
  updACartBar(); render();
}

function getACartItems(){
  var items=[];
  Object.keys(cart).forEach(function(key){
    var qty=cart[key]; if(!qty)return;
    var parts=key.split('-'),type=parts[0],idx=parseInt(parts[1]);
    if(type==='p'){
      var p=S.products[idx]; if(!p)return;
      var uc=p.costTotal/p.totalUnits;
      items.push({key:key,name:p.name,qty:qty,price:p.sellPrice,uc:uc,total:qty*p.sellPrice,profit:qty*(p.sellPrice-uc),unit:p.unit,type:'مفرد',prodIdx:idx});
    }
  });
  return items;
}

function updACartBar(){
  var items=getACartItems();
  var count=items.reduce(function(s,i){return s+i.qty;},0);
  var total=items.reduce(function(s,i){return s+i.total;},0);
  var bar=document.getElementById('a-cart-bar');
  bar.style.display=count>0?'flex':'none';
  document.getElementById('a-cart-count').textContent=count;
  document.getElementById('a-cart-total').textContent=total.toFixed(3)+' ر.ع';
}

function openACart(){
  document.getElementById('a-cart-modal').classList.add('open');
  renderACartModal();
}
function closeACart(){document.getElementById('a-cart-modal').classList.remove('open');}

function renderACartModal(){
  var items=getACartItems();
  var total=items.reduce(function(s,i){return s+i.total;},0);
  var profit=items.reduce(function(s,i){return s+i.profit;},0);
  var html=items.map(function(it){
    return '<div class="cart-item-row">'+
      '<div style="flex:1"><div style="font-weight:500;font-size:13px">'+it.name+'</div>'+
      '<div style="font-size:11px;color:#8b949e">'+it.qty+' '+it.unit+' × '+it.price.toFixed(3)+'</div></div>'+
      '<div style="display:flex;align-items:center;gap:8px">'+
        '<span style="color:#e67e22;font-weight:700">'+it.total.toFixed(3)+'</span>'+
        '<button onclick="removeACartItem(''+it.key+'')" style="background:rgba(192,57,43,.2);color:#c0392b;border:none;border-radius:5px;padding:3px 7px;cursor:pointer">✕</button>'+
      '</div>'+
    '</div>';
  }).join('');
  document.getElementById('a-cart-items').innerHTML=html||'<div style="color:#8b949e;text-align:center;padding:1rem">السلة فارغة</div>';
  document.getElementById('a-cart-modal-total').textContent=total.toFixed(3)+' ر.ع';
  document.getElementById('a-cart-profit').textContent='الربح المتوقع: '+profit.toFixed(3)+' ر.ع';
}

function removeACartItem(key){delete cart[key];updACartBar();renderACartModal();render();}
function clearACart(){cart={};updACartBar();closeACart();render();}

function adminCheckout(){
  var items=getACartItems();
  if(!items.length){toast('السلة فارغة',false);return;}
  showConfirm({
    title:'تأكيد البيع',
    items:items.map(function(it){return{label:it.name,val:it.qty+' × '+it.price.toFixed(3)+' = '+it.total.toFixed(3)+' ر.ع'};}),
    total:items.reduce(function(s,i){return s+i.total;},0),
    profit:items.reduce(function(s,i){return s+i.profit;},0)
  },function(payNow){
    var now=new Date().toLocaleString('ar-SA');
    items.forEach(function(it){
      S.products[it.prodIdx].qty-=it.qty;
      recordSaleAndDebt({type:it.type,name:it.name,qty:it.qty,price:it.price,cost:it.uc,revenue:it.total,profit:it.profit,time:now,saleId:now+it.name},payNow);
    });
    cart={};
    save(); updACartBar(); closeACart(); render();
    toast('✅ تم البيع بنجاح');
  });
}

function renderOrders(){
  var list=document.getElementById('orders-list');
  if(!list)return;
  var pending=_orders.filter(function(o){return o.status==='pending';});
  if(!_orders.length){list.innerHTML='<div style="color:#8b949e;text-align:center;padding:2rem">لا يوجد طلبات</div>';return;}
  list.innerHTML=_orders.map(function(o){
    var isPending=o.status==='pending';
    var itemsHtml=(o.items||[]).map(function(it){return '<div style="font-size:11px;color:#8b949e;padding:2px 0">• '+it.name+' × '+it.qty+' — '+it.total.toFixed(3)+' ر.ع</div>';}).join('');
    return '<div style="padding:14px 16px;border-bottom:1px solid rgba(255,255,255,.05);'+(isPending?'':'opacity:.6')+'">'+
      '<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px">'+
        '<div>'+
          '<div style="font-weight:600;font-size:14px">'+o.name+(o.phone?' — '+o.phone:'')+
            ' <span class="badge '+(isPending?'bg-o':'bg-g')+'">'+(isPending?'جديد':'تم')+' </span>'+
          '</div>'+
          '<div style="font-size:11px;color:#8b949e">'+o.time+'</div>'+
          (o.note?'<div style="font-size:11px;color:#e67e22;margin-top:3px">📝 '+o.note+'</div>':'')+
        '</div>'+
        '<div style="font-size:16px;font-weight:700;color:#e67e22">'+o.total.toFixed(3)+' ر.ع</div>'+
      '</div>'+
      itemsHtml+
      (isPending?
        '<div style="display:flex;gap:6px;margin-top:10px">'+
          '<button class="bn bg2 bn-sm" onclick="acceptOrder(''+o._key+'')">✅ قبول الطلب</button>'+
          '<button class="bn br bn-sm" onclick="rejectOrder(''+o._key+'')">❌ رفض</button>'+
        '</div>':'')+ 
    '</div>';
  }).join('');
  var pendingCount=pending.length;
  document.querySelectorAll('.tab').forEach(function(t){if(t.textContent.includes('الطلبات'))t.textContent=pendingCount>0?'🔔 الطلبات ('+pendingCount+')':'🔔 الطلبات';});
}

function acceptOrder(key){
  if(!confirm('قبول هذا الطلب؟'))return;
  firebase.database().ref('tawzea/orders/'+key+'/status').set('accepted');
}
function rejectOrder(key){
  if(!confirm('رفض هذا الطلب؟'))return;
  firebase.database().ref('tawzea/orders/'+key+'/status').set('rejected');
}

function render(){renderInv();renderWS();renderBundles();renderDebts();renderProfits();renderOrders();}
</script>

</div>

<script>
// Firebase Auth Init
var _auth = firebase.auth();

function doLogin(){
  var email = document.getElementById('login-email').value.trim();
  var pass = document.getElementById('login-pass').value;
  var btn = document.getElementById('login-btn');
  var err = document.getElementById('login-err');
  btn.textContent = 'جاري التحقق...';
  btn.disabled = true;
  err.style.display='none';
  _auth.signInWithEmailAndPassword(email, pass)
    .then(function(){
      // success - auth state will trigger
    })
    .catch(function(){
      err.style.display='block';
      btn.textContent='تسجيل الدخول';
      btn.disabled=false;
    });
}

_auth.onAuthStateChanged(function(user){
  if(user){
    document.getElementById('login-screen').style.display='none';
    document.getElementById('main-content').style.display='block';
  } else {
    document.getElementById('login-screen').style.display='flex';
    document.getElementById('main-content').style.display='none';
  }
});
</script>
