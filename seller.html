<script>
var firebaseConfig = {
  apiKey: "AIzaSyBtKZtI-0Hhh7Tisqg_Yd3Dt07B6e6PVYQ",
  authDomain: "tawzeaa-5a16b.firebaseapp.com",
  databaseURL: "https://tawzeaa-5a16b-default-rtdb.firebaseio.com",
  projectId: "tawzeaa-5a16b",
  storageBucket: "tawzeaa-5a16b.firebasestorage.app",
  messagingSenderId: "966030260523",
  appId: "1:966030260523:web:c124aadcd75ad45c2dad6e"
};
firebase.initializeApp(firebaseConfig);
var _db = firebase.database();
var _dbRef = _db.ref('tawzea/data');
var S = {products:[],ws:[],bundles:[],sales:[],debts:[]};
var _loaded = false;
var _saveTimer = null;

_dbRef.on('value', function(snap){
  _loaded = true;
  var val = snap.val();
  // دائماً خذ البيانات من Firebase - المصدر الوحيد للحقيقة
  S.products = (val&&val.products)||[];
  S.ws       = (val&&val.ws)||[];
  S.bundles  = (val&&val.bundles)||[];
  S.sales    = (val&&val.sales)||[];
  S.debts    = (val&&val.debts)||[];
  var ld = document.getElementById('loading-screen');
  if(ld) ld.style.display='none';
  var app = document.getElementById('main-app');
  if(app) app.style.display='block';
  render();
  var el=document.getElementById('sync-status');
  if(el){el.textContent='✅ متصل';el.style.color='#27ae60';}
});

function fbSave(){
  clearTimeout(_saveTimer);
  _saveTimer = setTimeout(function(){
    _dbRef.set({
      products:S.products, ws:S.ws, bundles:S.bundles,
      sales:S.sales, debts:S.debts, _ts:Date.now()
    });
  }, 200);
}

// retry connection automatically
var _retryCount = 0;
function _checkLoaded(){
  if(!_loaded){
    _retryCount++;
    if(_retryCount <= 3){
      // retry silently
      _dbRef.once('value', function(snap){
        if(snap.val()){
          _loaded = true;
          var val = snap.val();
          S.products = val.products||[];
          S.ws       = val.ws||[];
          S.bundles  = val.bundles||[];
          S.sales    = val.sales||[];
          S.debts    = val.debts||[];
          var ld=document.getElementById('loading-screen');
          if(ld)ld.style.display='none';
          var app=document.getElementById('main-app');
          if(app)app.style.display='block';
          render();
          var el=document.getElementById('sync-status');
          if(el){el.textContent='✅ متصل';el.style.color='#27ae60';}
        } else {
          setTimeout(_checkLoaded, 3000);
        }
      });
    } else {
      var ld=document.getElementById('loading-screen');
      if(ld)ld.innerHTML='<div style="text-align:center;padding:2rem"><div style="font-size:40px;margin-bottom:1rem">⚠️</div><div style="color:#c0392b;font-weight:600">تعذّر الاتصال</div><div style="font-size:12px;color:#8b949e;margin-top:8px">تأكد من الإنترنت</div><button onclick="location.reload()" style="margin-top:16px;padding:10px 24px;background:#c0392b;color:#fff;border:none;border-radius:8px;font-size:14px;cursor:pointer">إعادة المحاولة</button></div>';
    }
  }
}
setTimeout(_checkLoaded, 6000);
</script>

<div id="seller-pass-screen" style="display:flex;align-items:center;justify-content:center;min-height:100vh;flex-direction:column;gap:16px;padding:1rem;background:#0d1117">
  <div style="font-size:52px">🛒</div>

  <div style="background:#161b22;border:1px solid rgba(255,255,255,.12);border-radius:16px;padding:1.75rem;width:100%;max-width:300px">
    <div style="font-size:13px;color:#8b949e;margin-bottom:12px;text-align:center">أدخل كلمة السر</div>
    <input id="seller-pass-inp" type="password" placeholder="••••••••" style="width:100%;padding:12px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:8px;color:#fff;font-size:18px;text-align:center;direction:ltr;letter-spacing:6px;outline:none;margin-bottom:10px" onkeydown="if(event.key==='Enter')chkSellerPass()">
    <button onclick="chkSellerPass()" style="width:100%;padding:12px;background:#2980b9;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer">دخول</button>
    <div id="seller-pass-err" style="color:#c0392b;font-size:12px;text-align:center;margin-top:8px;display:none">❌ كلمة السر غلط</div>

  <a href="home.html" style="font-size:12px;color:#8b949e;text-decoration:none">← الرجوع للرئيسية</a>
</div>
<script>
var _SP='9801';
// check session
if(localStorage.getItem('seller_auth')==='1'){
  document.getElementById('seller-pass-screen').style.display='none';
}
function chkSellerPass(){
  var v=document.getElementById('seller-pass-inp').value;
  if(v===_SP){
    localStorage.setItem('seller_auth','1');
    document.getElementById('seller-pass-screen').style.display='none';
  } else {
    document.getElementById('seller-pass-err').style.display='block';
    document.getElementById('seller-pass-inp').value='';
    document.getElementById('seller-pass-inp').focus();
  }
}
</script>

      <button onclick="confirmPayNo()" style="flex:1;padding:12px;background:rgba(255,255,255,.07);color:#ccc;border:none;border-radius:9px;font-size:14px;cursor:pointer">إلغاء</button>

<script>
var confirmCb = null;

function sw(t){
  ['inv','ws','bun','debt','log'].forEach(function(x,i){
    document.querySelectorAll('.tab')[i].classList.toggle('active',x===t);
    document.getElementById('sec-'+x).classList.toggle('active',x===t);
  });
  render();
}

function openModal(html){document.getElementById('mc').innerHTML=html;document.getElementById('modal').classList.add('open');}
function closeModal(){document.getElementById('modal').classList.remove('open');}
document.getElementById('modal').addEventListener('click',function(e){if(e.target===this)closeModal();});

function showConfirm(data, cb){
  confirmCb = cb;
  var rows = data.items.map(function(i){return '<div class="confirm-detail-row"><span style="color:#8b949e">'+i.label+'</span><span>'+i.val+'</span></div>';}).join('');
  document.getElementById('confirm-box').innerHTML =
    '<h4 style="font-size:16px;font-weight:600;margin-bottom:.5rem;text-align:center">'+data.title+'</h4>'+
    '<div class="confirm-amount">'+data.total.toFixed(3)+' ر.ع</div>'+
    '<div style="margin-bottom:10px">'+rows+'</div>'+
    '<div class="fg" style="margin-bottom:12px">'+
      '<label>اسم الزبون (اختياري)</label>'+
      '<input id="conf-cust" placeholder="مثال: أبو علي" style="padding:9px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:8px;color:#fff;font-size:13px;direction:rtl;width:100%">'+
    '</div>'+
    '<div style="margin-bottom:14px">'+
      '<label style="font-size:12px;color:#8b949e;display:block;margin-bottom:6px">حالة الدفع</label>'+
      '<div style="display:flex;gap:8px">'+
        '<button class="bn bg2" id="pay-yes" onclick="setPayNow(true)" style="flex:1">✅ دفع الآن</button>'+
        '<button class="bn br" id="pay-no" onclick="setPayNow(false)" style="flex:1;opacity:.45">⏳ لم يدفع</button>'+
      '</div>'+
    '</div>'+
    '<div style="display:flex;gap:8px">'+
      '<button class="bn bb bn-lg" style="flex:1" onclick="doConfirm()">تأكيد البيع</button>'+
      '<button class="bn bn-lg" style="flex:1;background:rgba(255,255,255,.07);color:#ccc" onclick="cancelConfirm()">إلغاء</button>'+
    '</div>';
  document.getElementById('confirm-ov').classList.add('open');
  window._payNow = true;
}
function setPayNow(v){
  window._payNow=v;
  document.getElementById('pay-yes').style.opacity=v?'1':'.4';
  document.getElementById('pay-no').style.opacity=v?'.4':'1';
}
function doConfirm(){document.getElementById('confirm-ov').classList.remove('open');if(confirmCb){confirmCb(window._payNow);confirmCb=null;}}
function cancelConfirm(){document.getElementById('confirm-ov').classList.remove('open');confirmCb=null;}

function toast(msg,ok){
  var d=document.createElement('div');
  d.style.cssText='position:fixed;bottom:20px;right:20px;z-index:300;padding:10px 16px;border-radius:9px;font-size:13px;font-weight:500;max-width:280px;color:#fff;box-shadow:0 4px 16px rgba(0,0,0,.5)';
  d.style.background=ok!==false?'rgba(39,174,96,.9)':'rgba(192,57,43,.9)';
  d.textContent=msg;
  document.body.appendChild(d);
  setTimeout(function(){d.style.opacity='0';setTimeout(function(){d.remove();},300);},3000);
}

function recordSale(sale, payNow){
  var cust = (document.getElementById('conf-cust')||{}).value||'';
  sale.customer = cust.trim();
  sale.paid = payNow;
  sale.paidDate = payNow ? new Date().toLocaleString('ar-SA') : '';
  sale.saleId = sale.time; // مفتاح مطابقة فريد
  S.sales.unshift(sale);
  if(!payNow){
    S.debts.unshift({id:Date.now(),saleId:sale.saleId,customer:cust||'زبون غير معروف',amount:sale.revenue,desc:sale.name,time:sale.time,paid:false,paidDate:''});
  }
}

/* ===== المنتجات ===== */
function renderInv(){
  var g=document.getElementById('pgrid');
  if(!S.products.length){g.innerHTML='<div style="color:#8b949e;text-align:center;padding:3rem;grid-column:1/-1">لا يوجد منتجات بعد</div>';return;}
  g.innerHTML=S.products.map(function(p,i){
    var low=p.qty<=p.minQty;
    return '<div class="pc" style="'+(low?'border-color:#c0392b':'')+'">'+
      '<div class="pi">'+(p.img?'<img src="'+p.img+'" alt="'+p.name+'">':'<span style="font-size:42px">📦</span>')+'</div>'+
      '<div class="pinfo">'+
        '<div class="pn">'+p.name+'</div>'+
        '<div class="pq" style="color:'+(low?'#c0392b':'#27ae60')+'">الكمية: <strong>'+p.qty+'</strong> '+p.unit+(low?' ⚠️':'')+'</div>'+
        '<div style="font-size:12px;color:#e67e22;margin-bottom:8px">'+p.sellPrice.toFixed(3)+' ر.ع / '+p.unit+'</div>'+
        '<div class="pqr">'+
          '<input class="qi" type="number" id="si-'+i+'" min="1" max="'+p.qty+'" value="1">'+
          '<button class="bn bg2 bn-sm" style="margin-bottom:4px;width:100%" onclick="addToCart(\'product\','+i+')">🛒 سلة</button>'+
          '<button class="bn bb bn-sm" style="width:100%" onclick="sellOne('+i+')">💰 بيع</button>'+
        '</div>'+
      '</div>'+
    '</div>';
  }).join('');
}

function sellOne(idx){
  var qty=parseInt(document.getElementById('si-'+idx).value)||1;
  var p=S.products[idx];
  if(qty>p.qty){toast('الكمية أكبر من المخزون!',false);return;}
  var revenue=qty*p.sellPrice;
  var uc=p.costTotal/p.totalUnits;
  showConfirm({
    title:'بيع: '+p.name,
    items:[{label:'الكمية',val:qty+' '+p.unit},{label:'سعر الحبة',val:p.sellPrice.toFixed(3)+' ر.ع'}],
    total:revenue
  },function(payNow){
    p.qty-=qty;
    recordSale({type:'مفرد',name:p.name,qty:qty,price:p.sellPrice,cost:uc,revenue:revenue,profit:revenue-qty*uc,time:new Date().toLocaleString('ar-SA')},payNow);
    fbSave();render();toast('✅ تم البيع');
  });
}

/* ===== الجملة ===== */
function renderWS(){
  var list=document.getElementById('ws-list');
  if(!S.ws.length){list.innerHTML='<div style="color:#8b949e;text-align:center;padding:3rem">لا يوجد أسعار جملة</div>';return;}
  list.innerHTML=S.ws.map(function(w,wi){
    var p=S.products.find(function(x){return x.id===w.productId;});
    var tiersHtml=w.tiers.map(function(t,ti){
      return '<div class="tier-box" id="stb-'+wi+'-'+ti+'" onclick="selTier('+wi+','+ti+')">'+
        '<div class="tq">'+t.qty+'</div>'+
        '<div class="tu">'+(p?p.unit:'حبة')+'</div>'+
        '<div class="tp">'+t.totalPrice.toFixed(3)+' ر.ع</div>'+
      '</div>';
    }).join('');
    var prodImg=p&&p.img?'<img src="'+p.img+'" style="width:52px;height:52px;border-radius:10px;object-fit:cover;flex-shrink:0">':'<div style="width:52px;height:52px;border-radius:10px;background:#1c2128;display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0">📦</div>';
    return '<div class="ws-card">'+
      '<div style="display:flex;align-items:center;gap:10px;margin-bottom:12px">'+
        prodImg+
        '<div><div style="font-weight:600;font-size:14px">'+w.name+'</div><div style="font-size:12px;color:#8b949e">'+(p?p.name:'منتج محذوف')+' | المخزون: <strong style="color:#27ae60">'+(p?p.qty:0)+'</strong> '+(p?p.unit:'')+'</div></div>'+
      '</div>'+
      '<div class="tiers-grid">'+tiersHtml+'</div>'+
      '<div class="ws-sell-bar">'+
        '<div><div style="font-size:11px;color:#8b949e;margin-bottom:4px">الكمية</div>'+
        '<input class="ws-qty" type="number" id="swq-'+wi+'" value="'+(w.tiers[0]?w.tiers[0].qty:1)+'" min="1" oninput="calcSWS('+wi+')" onchange="calcSWS('+wi+')"></div>'+
        '<div style="flex:1"><div style="font-size:11px;color:#8b949e">الإجمالي</div><div style="font-size:20px;font-weight:700;color:#e67e22" id="swt-'+wi+'">—</div><div style="font-size:11px" id="swp-'+wi+'"></div></div>'+
        '<button class="bn bg2" onclick="addToCart(\'ws\','+wi+')" style="padding:10px 12px;font-size:13px">🛒</button> '+
        '<button class="bn bb" onclick="sellWS('+wi+')" style="padding:11px 14px;font-size:13px">💰 بيع</button>'+
      '</div>'+
    '</div>';
  }).join('');
  S.ws.forEach(function(w,wi){calcSWS(wi);});
}

function selTier(wi,ti){
  var w=S.ws[wi];
  document.querySelectorAll('[id^="stb-'+wi+'-"]').forEach(function(el){el.classList.remove('sel');});
  var el=document.getElementById('stb-'+wi+'-'+ti);if(el)el.classList.add('sel');
  var inp=document.getElementById('swq-'+wi);
  if(inp){inp.value=w.tiers[ti].qty;calcSWS(wi);}
}
function calcSWS(wi){
  var w=S.ws[wi];
  var p=S.products.find(function(x){return x.id===w.productId;});
  var inp=document.getElementById('swq-'+wi);if(!inp||!p)return;
  var qty=parseInt(inp.value)||0;
  var sorted=w.tiers.slice().sort(function(a,b){return b.qty-a.qty;});
  var tier=sorted.find(function(t){return qty>=t.qty;});
  var up=tier?tier.totalPrice/tier.qty:p.sellPrice;
  var total=qty*up;
  var wt=document.getElementById('swt-'+wi),wp=document.getElementById('swp-'+wi);
  if(wt)wt.textContent=total.toFixed(3)+' ر.ع';
  if(wp){wp.textContent=up.toFixed(3)+' ر.ع/'+p.unit;wp.style.color='#8b949e';}
  if(tier){document.querySelectorAll('[id^="stb-'+wi+'-"]').forEach(function(el,i){el.classList.toggle('sel',w.tiers[i]&&w.tiers[i].qty===tier.qty);});}
}
function sellWS(wi){
  var w=S.ws[wi];
  var p=S.products.find(function(x){return x.id===w.productId;});
  if(!p){toast('المنتج غير موجود',false);return;}
  var qty=parseInt(document.getElementById('swq-'+wi).value)||0;
  if(qty<1){toast('أدخل كمية صحيحة',false);return;}
  if(qty>p.qty){toast('المخزون غير كافٍ! المتاح: '+p.qty,false);return;}
  var uc=p.costTotal/p.totalUnits;
  var sorted=w.tiers.slice().sort(function(a,b){return b.qty-a.qty;});
  var tier=sorted.find(function(t){return qty>=t.qty;});
  if(!tier){toast('الكمية أقل من أدنى شريحة ('+w.tiers[0].qty+')',false);return;}
  var up=tier.totalPrice/tier.qty;
  var revenue=qty*up;
  showConfirm({
    title:'جملة: '+w.name,
    items:[{label:'المنتج',val:p.name},{label:'الكمية',val:qty+' '+p.unit},{label:'سعر الحبة',val:up.toFixed(3)+' ر.ع'}],
    total:revenue
  },function(payNow){
    p.qty-=qty;
    recordSale({type:'جملة',name:w.name+'('+p.name+')',qty:qty,price:up,cost:uc,revenue:revenue,profit:revenue-qty*uc,time:new Date().toLocaleString('ar-SA')},payNow);
    fbSave();render();toast('✅ تم البيع');
  });
}

/* ===== العروض ===== */
function renderBundles(){
  var list=document.getElementById('bun-list');
  if(!S.bundles.length){list.innerHTML='<div style="color:#8b949e;text-align:center;padding:3rem">لا يوجد عروض</div>';return;}
  list.innerHTML=S.bundles.map(function(b,bi){
    var canSell=b.items.every(function(it){var p=S.products.find(function(x){return x.id===it.productId;});return p&&p.qty>=it.qty;});
    var itemsHtml=b.items.map(function(it){
      var p=S.products.find(function(x){return x.id===it.productId;});
      return '<div class="bi-card">'+
        '<div class="bi-thumb">'+(p&&p.img?'<img src="'+p.img+'" alt="">':'📦')+'</div>'+
        '<div style="font-size:11px;font-weight:500;margin-bottom:2px">'+(p?p.name:'محذوف')+'</div>'+
        '<div style="font-size:13px;color:#e67e22;font-weight:700">'+it.qty+' '+(p?p.unit:'')+'</div>'+
      '</div>';
    }).join('');
    return '<div class="bun-card">'+
      '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">'+
        '<span style="font-weight:600;font-size:15px">'+b.name+'</span>'+
        '<span style="font-size:20px;font-weight:700;color:#e67e22">'+b.price.toFixed(3)+' ر.ع</span>'+
      '</div>'+
      '<div class="bun-items-grid">'+itemsHtml+'</div>'+
      '<button class="bn '+(canSell?'bb':'')+'" style="'+(canSell?'':'background:rgba(255,255,255,.05);color:#555;cursor:not-allowed')+';padding:11px;font-size:13px;width:100%;border-radius:9px" onclick="'+(canSell?'sellBundle('+bi+')':'toast(\'المخزون غير كافٍ\',false)')+'">'+(canSell?'🛒 بيع العرض':'⚠️ مخزون ناقص')+'</button>'+
    '</div>';
  }).join('');
}
function sellBundle(bi){
  var b=S.bundles[bi];
  var tc=b.items.reduce(function(s,it){var p=S.products.find(function(x){return x.id===it.productId;});return s+(p?it.qty*(p.costTotal/p.totalUnits):0);},0);
  var items=b.items.map(function(it){var p=S.products.find(function(x){return x.id===it.productId;});return{label:p?p.name:'منتج',val:it.qty+' '+(p?p.unit:'حبة')};});
  showConfirm({title:'عرض: '+b.name,items:items,total:b.price},function(payNow){
    b.items.forEach(function(it){var p=S.products.find(function(x){return x.id===it.productId;});if(p)p.qty-=it.qty;});
    recordSale({type:'عرض',name:b.name,qty:1,price:b.price,cost:tc,revenue:b.price,profit:b.price-tc,time:new Date().toLocaleString('ar-SA')},payNow);
    fbSave();render();toast('✅ تم البيع');
  });
}

/* ===== سجل البائع ===== */
function renderLog(){
  var log=document.getElementById('my-log');
  if(!S.sales.length){log.innerHTML='<div style="color:#8b949e;text-align:center;padding:2rem;font-size:13px">لا توجد مبيعات</div>';return;}
  log.innerHTML=S.sales.map(function(s){
    return '<div class="log-row">'+
      '<div style="flex:1">'+
        '<div style="font-weight:500;font-size:13px">'+s.name+(s.customer?' — <span style="color:#9b59b6">'+s.customer+'</span>':'')+'</div>'+
        '<div style="font-size:11px;color:#8b949e">'+s.qty+' × '+s.price.toFixed(3)+' ر.ع | '+s.time+'</div>'+
      '</div>'+
      '<div style="text-align:left">'+
        '<div style="font-size:14px;font-weight:700;color:#e67e22">'+s.revenue.toFixed(3)+' ر.ع</div>'+
        '<div>'+(s.paid===false?'<span class="badge bg-r">لم يدفع</span>':s.paid===true?'<span class="badge bg-g">✅ تم الدفع</span>':'<span class="badge bg-g">✅ دفع</span>')+'</div>'+
      '</div>'+
    '</div>';
  }).join('');
}

function renderDebt(){
  var list=document.getElementById('debt-list');
  if(!S.debts.length){list.innerHTML='<div style="color:#27ae60;text-align:center;padding:2rem;font-size:13px">✅ لا يوجد مستحقات</div>';return;}
  list.innerHTML=S.debts.map(function(d,i){
    return '<div class="log-row" style="'+(d.paid?'opacity:.6':'')+'">'+
      '<div style="flex:1">'+
        '<div style="font-weight:600;font-size:14px;color:'+(d.paid?'#27ae60':'#e67e22')+'">'+d.customer+
          (d.paid?' <span class="badge bg-g">✅ دفع</span>':' <span class="badge bg-r">لم يدفع</span>')+
        '</div>'+
        '<div style="font-size:11px;color:#8b949e">'+d.desc+' | '+d.time+(d.paid&&d.paidDate?' | دفع: '+d.paidDate:'')+'</div>'+
      '</div>'+
      '<div style="text-align:left;display:flex;flex-direction:column;align-items:flex-end;gap:5px">'+
        '<div style="font-size:16px;font-weight:700;color:'+(d.paid?'#27ae60':'#c0392b')+'">'+d.amount.toFixed(3)+' ر.ع</div>'+
        (!d.paid?'<button class="bn bg2 bn-sm" onclick="sellerMarkPaid('+i+')">✅ تم الدفع</button>':'')+
      '</div>'+
    '</div>';
  }).join('');
}

var _pendingPayIdx = null;
function sellerMarkPaid(i){
  var d = S.debts[i];
  _pendingPayIdx = i;
  document.getElementById('pay-confirm-msg').textContent = 
    'الزبون: ' + d.customer + ' | المبلغ: ' + d.amount.toFixed(3) + ' ر.ع';
  document.getElementById('pay-confirm-ov').classList.add('open');
}
function confirmPayYes(){
  document.getElementById('pay-confirm-ov').classList.remove('open');
  if(_pendingPayIdx === null) return;
  var i = _pendingPayIdx; _pendingPayIdx = null;
  var d = S.debts[i];
  d.paid = true;
  d.paidDate = new Date().toLocaleString('ar-SA');
  S.sales.forEach(function(s){
    var match = (d.saleId && s.saleId && d.saleId===s.saleId) ||
                (d.time && s.time && d.time===s.time);
    if(match && !s.paid){ s.paid=true; s.paidDate=d.paidDate; }
  });
  fbSave(); render(); toast('✅ تم تسجيل الدفع');
}
function confirmPayNo(){
  document.getElementById('pay-confirm-ov').classList.remove('open');
  _pendingPayIdx = null;
}

var cart=[];
function addToCart(type,idx){
  if(type==='product'){
    var p=S.products[idx];
    var qty=parseInt(document.getElementById('si-'+idx).value)||1;
    if(qty>p.qty){toast('الكمية أكبر من المخزون!',false);return;}
    var ex=cart.find(function(c){return c.type==='product'&&c.idx===idx;});
    if(ex){if(ex.qty+qty>p.qty){toast('الكمية أكبر من المخزون!',false);return;}ex.qty+=qty;ex.revenue=ex.qty*p.sellPrice;}
    else{cart.push({type:'product',idx:idx,name:p.name,qty:qty,price:p.sellPrice,revenue:qty*p.sellPrice,unit:p.unit,cost:p.costTotal/p.totalUnits});}
  } else if(type==='ws'){
    var w=S.ws[idx];var pw=S.products.find(function(x){return x.id===w.productId;});
    var qty2=parseInt(document.getElementById('swq-'+idx).value)||0;
    if(!pw||qty2<1){toast('أدخل كمية صحيحة',false);return;}
    if(qty2>pw.qty){toast('المخزون غير كافِ',false);return;}
    var sorted=w.tiers.slice().sort(function(a,b){return b.qty-a.qty;});
    var tier=sorted.find(function(t){return qty2>=t.qty;});
    if(!tier){toast('الكمية أقل من أدنى شريحة',false);return;}
    var up=tier.totalPrice/tier.qty;
    cart.push({type:'ws',idx:idx,name:w.name+'('+pw.name+')',qty:qty2,price:up,revenue:qty2*up,unit:pw.unit,cost:pw.costTotal/pw.totalUnits});
  } else if(type==='bundle'){
    var b=S.bundles[idx];
    var ok=b.items.every(function(it){var pb=S.products.find(function(x){return x.id===it.productId;});return pb&&pb.qty>=it.qty;});
    if(!ok){toast('المخزون غير كافِ',false);return;}
    var tc=b.items.reduce(function(s,it){var pb=S.products.find(function(x){return x.id===it.productId;});return s+(pb?it.qty*(pb.costTotal/pb.totalUnits):0);},0);
    cart.push({type:'bundle',idx:idx,name:b.name,qty:1,price:b.price,revenue:b.price,unit:'عرض',cost:tc});
  }
  updateCartBubble();toast('✅ أضيف للسلة');
}
function updateCartBubble(){
  var total=cart.reduce(function(s,c){return s+c.qty;},0);
  var cnt=document.getElementById('cart-count');
  if(cnt){cnt.textContent=total;cnt.style.display=total>0?'flex':'none';}
}
function openCart(){
  if(!cart.length){toast('السلة فارغة',false);return;}
  var total=cart.reduce(function(s,c){return s+c.revenue;},0);
  var rows=cart.map(function(c,i){
    return '<div class="cart-item-row"><div style="flex:1"><div style="font-weight:500;font-size:13px">'+c.name+'</div>'+
    '<div style="font-size:11px;color:#8b949e">'+c.qty+' '+c.unit+' × '+c.price.toFixed(3)+' ر.ع</div></div>'+
    '<div style="display:flex;align-items:center;gap:8px"><span style="font-weight:600;color:#e67e22">'+c.revenue.toFixed(3)+'</span>'+
    '<button onclick="removeFromCart('+i+')" style="background:rgba(192,57,43,.2);border:none;color:#e74c3c;border-radius:5px;padding:3px 7px;cursor:pointer">✕</button></div></div>';
  }).join('');
  openModal('<h3>🛒 السلة</h3><div style="margin-bottom:14px">'+rows+'</div>'+
    '<div style="display:flex;justify-content:space-between;padding:10px 0;border-top:1px solid rgba(255,255,255,.1);margin-bottom:14px">'+
    '<span style="color:#8b949e">الإجمالي</span>'+
    '<span style="font-size:22px;font-weight:700;color:#e67e22">'+total.toFixed(3)+' ر.ع</span></div>'+
    '<div style="display:flex;gap:8px">'+
    '<button onclick="checkoutCart()" class="bn bg2" style="flex:1;padding:12px;font-size:14px;border-radius:9px">💰 إتمام البيع</button>'+
    '<button onclick="closeModal()" class="bn" style="flex:1;padding:12px;font-size:14px;border-radius:9px;background:rgba(255,255,255,.07);color:#ccc">إلغاء</button></div>');
}
function removeFromCart(i){cart.splice(i,1);updateCartBubble();if(cart.length)openCart();else closeModal();}
function checkoutCart(){
  closeModal();
  var total=cart.reduce(function(s,c){return s+c.revenue;},0);
  var items=cart.map(function(c){return{label:c.name,val:c.qty+' '+c.unit};});
  showConfirm({title:'فاتورة السلة',items:items,total:total},function(payNow){
    cart.forEach(function(c){
      if(c.type==='product'){S.products[c.idx].qty-=c.qty;}
      else if(c.type==='ws'){var w=S.ws[c.idx];var p=S.products.find(function(x){return x.id===w.productId;});if(p)p.qty-=c.qty;}
      else if(c.type==='bundle'){var b=S.bundles[c.idx];b.items.forEach(function(it){var p=S.products.find(function(x){return x.id===it.productId;});if(p)p.qty-=it.qty;});}
    });
    var nm=cart.map(function(c){return c.name;}).join(' + ');
    var tc=cart.reduce(function(s,c){return s+c.qty*c.cost;},0);
    recordSale({type:'سلة',name:nm,qty:1,price:total,cost:tc,revenue:total,profit:total-tc,time:new Date().toLocaleString('ar-SA')},payNow);
    cart=[];updateCartBubble();fbSave();render();toast('✅ تم البيع');
  });
}

function render(){renderInv();renderWS();renderBundles();renderLog();renderDebt();}
</script>
</body>
</html>
